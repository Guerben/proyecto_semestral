
# Configuración de Nginx
# Este archivo configura nginx para servir la aplicación React SPA
# con optimizaciones de cache, CORS y reescritura de URLs


# Ejecutar nginx con el usuario especificado en la imagen Docker
user nginx;

# Número de worker processes (auto = número de CPUs)
worker_processes auto;

# Archivo de logs de errores
error_log /var/log/nginx/error.log warn;

# Archivo del Process ID
pid /var/run/nginx.pid;

# EVENTOS - Configuración del procesamiento de conexiones

events {
    # Número máximo de conexiones simultáneas por worker
    worker_connections 1024;
    
    # Usar epoll (Linux) para mejor rendimiento
    use epoll;
}

# HTTP - Configuración del servidor HTTP
http {
    # Incluir tipos MIME por defecto
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Formato de logs de acceso personalizado
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # Archivo de logs de acceso
    access_log /var/log/nginx/access.log main;
    
    # OPTIMIZACIONES DE RENDIMIENTO

    
    # Enviar archivos de forma eficiente (kernel copy)
    sendfile on;
    
    # Desactivar buffering de TCP (reduce latencia)
    tcp_nopush on;
    tcp_nodelay on;
    
    # Timeout de conexión inactiva
    keepalive_timeout 65;
    
    # Tamaño máximo de headers de cliente
    large_client_header_buffers 4 16k;
    
    # Comprimir respuestas HTTP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # CONFIGURACIÓN DEL SERVIDOR VIRTUAL
    server {
        # Puerto en el que escucha
        listen 80 default_server;
        
        # Nombre del servidor (wildcard)
        server_name _;
        
        # Raíz de los archivos estáticos
        root /usr/share/nginx/html;
        
        # Archivo índice
        index index.html;
        
        # CACHE PARA ARCHIVOS ESTÁTICOS
        # Archivos: JavaScript compilado, CSS, imágenes, fuentes
        # Cache expire: 1 año (los hashes de webpack previenen problemas)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            # Expirar en 1 año
            expires 1y;
            
            # Headers de cache control
            add_header Cache-Control "public, immutable";
            
            # Headers de seguridad
            add_header X-Content-Type-Options "nosniff";
            
            # No registrar acceso de archivos estáticos en logs
            access_log off;
        }
        

        # HTML Y RUTAS SPA
        # No cachear HTML para que siempre obtenga la última versión
        location ~* \.(html)$ {
            # Expirar inmediatamente
            expires 0;
            
            # No cachear en navegador
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Reescritura para Single Page Application
        # Todas las rutas se sirven desde index.html (excepto archivos estáticos)
        location / {
            # Intentar servir archivos/directorios, sino servir index.html
            try_files $uri /index.html;
            
            # Headers de seguridad
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
        }
        
        # ENDPOINT DE HEALTH CHECK
        # Usado por Docker para verificar que el contenedor está sano
        location /health {
            # No registrar en logs
            access_log off;
            
            # Retornar respuesta 200 OK
            return 200 "healthy\n";
            
            # Tipo de contenido
            add_header Content-Type text/plain;
        }
        
        # DESHABILITAR ACCESO A ARCHIVOS SENSIBLES
        # Denegar acceso a archivos de configuración
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Denegar acceso a archivos de sistemas operativos
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # ERROR PAGES
        # Servir index.html para errores 404 (SPA)
        error_page 404 =200 /index.html;
        
        # Servir página de error 500
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
